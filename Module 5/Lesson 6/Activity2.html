<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <p>Enter a number and click OK</p>
        <input id="id" type="number" min="100" max="300" required>
        <button onclick="myFunction()">OK</button>
        <p>If the number is less than 100 or more than 300, an error message will be displayed</p>
        <p id="result"></p>

        <script>
            function myFunction() {
                var number = document.getElementById("id");
                
                if(!number.checkValidity()) {
                    document.getElementById("result").innerHTML = number.validationMessage;
                } else {
                    document.getElementById("result").innerHTML = "Input OK";
                }
            }
        </script>
    </body>
</html>
