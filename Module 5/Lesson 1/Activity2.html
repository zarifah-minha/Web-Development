<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h1>JavaScript While Loop</h1>
        <p id="number"></p>

        <script>
            var i = 1;
            while (i <= 10) {
                document.getElementById("number").innerHTML+= i + "<br>";
                i++
            }
        </script>
    </body>
</html>
