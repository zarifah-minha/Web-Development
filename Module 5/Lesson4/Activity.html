<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h2>JavaScript Type Conversion</h2>
        <p id="add"></p>
        <p id="string"></p>

        <script>
            var a = 70;
            var b = 90;

            document.getElementById("add").innerHTML = a+b;

            document.getElementById("string").innerHTML = String(a)+String(b);
        </script>
    </body>
</html>
