<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h1>JavaScript Classes</h1>
        <p id="result"></p>

        <script>
            class Person {

                constructor(name,year,nationality) {
                    this.name = name;
                    this.year = year;
                    this.nationality = nationality;
                }
                age() {
                    var currentYear = new Date().getFullYear();
                    return currentYear - this.year ; 
                }
            }
            var person1 = new Person("Alice",1990,"American");
            document.getElementById("result").innerHTML = "My name is "+person1.name+" and I am "+person1.age()+" years old. I am "+person1.nationality+"." ;
        </script>
    </body>
</html>
