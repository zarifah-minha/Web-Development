<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h1>JavaScript For Loops</h1>
        <p id="result"></p>

        <script>
            var fruits = ['Mango','Apple','Kiwi','Banana','Grape'];
            var text = '';
            var i;

            for(i=0; i<fruits.length; i++){
                text = text + fruits [i]+ "<br>";
            }
            document.getElementById("result").innerHTML=text;
        </script>
    </body>
</html>
