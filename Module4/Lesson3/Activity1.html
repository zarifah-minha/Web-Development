<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h1>JavaScript String Methods</h1>
        <p>Basic Methods</p>

        <script>
            var word = "AmAzInG";
            document.write(word.toUpperCase());
            document.write("<br>")

            document.write(word.toLowerCase())
            document.write("<br>")


            document.write(word.startsWith("I"))
        </script>
    </body>
</html>
