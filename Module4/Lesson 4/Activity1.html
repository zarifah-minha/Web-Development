<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h3>JavaScript Object</h3>
        <p id="result"></p>

        <script>
            var student = {
                'name' : 'Riya',
                'age' : 14,
                'grade' : 9,
                'city' : 'Dhaka',
            }

            document.getElementById("result").innerHTML = "My name is "+student.name+". I am "+student.age+" years old. I read in grade "+student.grade+". I live in "+student.city+"."
        </script>
    </body>
</html>
