<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h1>Information about a Flower</h1>
        <p id="result"></p>

        <script>
            var flower = {
                name: 'Rose',
                color: 'Red',
                petals: 32,
                fragrance: 'Sweet'
            }

            document.getElementById("result").innerHTML = "The flower name is "+flower.name + ". Its color is "+flower.color + ". It has "+flower.petals+" petals. Its fragrance is "+flower.fragrance+"."
        </script>
    </body>
</html>
