<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h1>JavaScript Math Object</h1>

        <script>
            var random = Math.random();
            document.write("Random number between 0 and 1: " , Math.round(random * 100) / 100, "<br>");

            var pi = Math.PI;
            document.write("value of pi: ", pi, "<br>");

            var sqrt4 = Math.sqrt(4);
            document.write("Square root of 4 : ", sqrt4, "<br>");

            var power = Math.pow(2,3);
            document.write("2 raised to the power of 3: ", power,"<br>")
        </script>
    </body>
</html>
