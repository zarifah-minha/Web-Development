<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
                text-align: center;
            }
            #dice {
                font-size: 320px;
            }
            #dice:hover {
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <div>Click on the dice...</div>
        <div id="dice" onclick="stopstart()"></div>
        <script>
            var dices = ['&#9856;', '&#9857;', '&#9858;', '&#9859;', '&#9860;', '&#9861;'];
            var stopped = true;

            function change() {
                var random = Math.floor(Math.random()*6);
                document.getElementById("dice").innerHTML = dices[random];
            }
            function stopstart() {
                if (stopped) {
                    interval = setInterval(change, 100);
                    stopped = false;
                } else {
                    clearInterval(interval);
                    stopped = true;
                }
            }
            window.onload = function() {
                dice = document.getElementById("dice");
                stopstart()
            }
        </script>


    </body>
</html>
